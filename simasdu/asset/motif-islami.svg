<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Latar transparan -->
  <rect width="200" height="200" fill="none"/>
  <!-- Garis pola: putih tipis dengan opasitas rendah -->
  <g stroke="#ffffff" stroke-opacity="0.12" stroke-width="1">
    <!-- Grid diagonal (membentuk motif geometris islami sederhana) -->
    <!-- Diagonal / -->
    <path d="M -200 0 L 200 400"/>
    <path d="M -160 0 L 240 400"/>
    <path d="M -120 0 L 280 400"/>
    <path d="M -80 0 L 320 400"/>
    <path d="M -40 0 L 360 400"/>
    <path d="M 0 0 L 400 400"/>
    <path d="M 40 0 L 440 400"/>
    <path d="M 80 0 L 480 400"/>
    <path d="M 120 0 L 520 400"/>
    <path d="M 160 0 L 560 400"/>
    <path d="M 200 0 L 600 400"/>

    <!-- Diagonal \ -->
    <path d="M 400 0 L 0 400"/>
    <path d="M 360 0 L -40 400"/>
    <path d="M 320 0 L -80 400"/>
    <path d="M 280 0 L -120 400"/>
    <path d="M 240 0 L -160 400"/>
    <path d="M 200 0 L -200 400"/>
    <path d="M 160 0 L -240 400"/>
    <path d="M 120 0 L -280 400"/>
    <path d="M 80 0 L -320 400"/>
    <path d="M 40 0 L -360 400"/>
    <path d="M 0 0 L -400 400"/>

    <!-- Lingkaran simpul (aksen bintang/roset kecil di node perpotongan) -->
    <!-- Titik-titik node tiap 40px -->
    <g fill="none">
      <!-- baris y: 0,40,80,120,160,200 -->
      <!-- x: 0..200 step 40 -->
      <!-- ukuran kecil agar halus -->
      <circle cx="0" cy="0" r="3"/>
      <circle cx="40" cy="0" r="3"/>
      <circle cx="80" cy="0" r="3"/>
      <circle cx="120" cy="0" r="3"/>
      <circle cx="160" cy="0" r="3"/>
      <circle cx="200" cy="0" r="3"/>

      <circle cx="0" cy="40" r="3"/>
      <circle cx="40" cy="40" r="3"/>
      <circle cx="80" cy="40" r="3"/>
      <circle cx="120" cy="40" r="3"/>
      <circle cx="160" cy="40" r="3"/>
      <circle cx="200" cy="40" r="3"/>

      <circle cx="0" cy="80" r="3"/>
      <circle cx="40" cy="80" r="3"/>
      <circle cx="80" cy="80" r="3"/>
      <circle cx="120" cy="80" r="3"/>
      <circle cx="160" cy="80" r="3"/>
      <circle cx="200" cy="80" r="3"/>

      <circle cx="0" cy="120" r="3"/>
      <circle cx="40" cy="120" r="3"/>
      <circle cx="80" cy="120" r="3"/>
      <circle cx="120" cy="120" r="3"/>
      <circle cx="160" cy="120" r="3"/>
      <circle cx="200" cy="120" r="3"/>

      <circle cx="0" cy="160" r="3"/>
      <circle cx="40" cy="160" r="3"/>
      <circle cx="80" cy="160" r="3"/>
      <circle cx="120" cy="160" r="3"/>
      <circle cx="160" cy="160" r="3"/>
      <circle cx="200" cy="160" r="3"/>

      <circle cx="0" cy="200" r="3"/>
      <circle cx="40" cy="200" r="3"/>
      <circle cx="80" cy="200" r="3"/>
      <circle cx="120" cy="200" r="3"/>
      <circle cx="160" cy="200" r="3"/>
      <circle cx="200" cy="200" r="3"/>
    </g>
  </g>
</svg>
